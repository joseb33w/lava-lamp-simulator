<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lava Lamp Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <canvas id="lamp-canvas" aria-label="Interactive lava lamp simulator"></canvas>

    <div id="error-banner" class="error-banner hidden" role="status" aria-live="polite"></div>

    <button id="panel-toggle" class="panel-toggle" type="button" aria-label="Open controls" aria-controls="control-panel" aria-expanded="false">
      <span class="panel-toggle-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
      <span class="panel-toggle-text">Controls</span>
    </button>

    <section id="control-panel" class="control-panel" aria-label="Lava lamp controls">
      <div class="panel-grab" aria-hidden="true"></div>
      <div class="panel-header">
        <p class="eyebrow">Interactive Fluid Toy</p>
        <h1>Lava Lamp</h1>
        <p class="panel-copy">A rebuilt version focused on reliable preview rendering. Adjust the palette, heat, and activity in real time.</p>
      </div>

      <div class="controls-grid">
        <div class="control-group">
          <label for="lava-color">Lava color</label>
          <div class="color-row">
            <input id="lava-color" type="color" value="#ff6b3d" aria-label="Choose lava color">
            <span id="lava-color-value" class="color-value">#ff6b3d</span>
          </div>
        </div>

        <div class="control-group">
          <label for="liquid-color">Liquid color</label>
          <div class="color-row">
            <input id="liquid-color" type="color" value="#4b2a8f" aria-label="Choose liquid color">
            <span id="liquid-color-value" class="color-value">#4b2a8f</span>
          </div>
        </div>

        <div class="control-group slider-group">
          <label for="heat-level">Heat</label>
          <input id="heat-level" type="range" min="0.6" max="1.6" step="0.01" value="1">
        </div>

        <div class="control-group slider-group">
          <label for="blob-count">Blob activity</label>
          <input id="blob-count" type="range" min="6" max="16" step="1" value="10">
        </div>
      </div>

      <button id="shuffle-palette" class="action-button" type="button">Shuffle palette</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
